name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version WITHOUT a leading v, e.g. 3.3.3 or 3.3.3-rc1 (must match Cargo.toml)"
        required: true
      sha:
        description: "Full commit SHA to release (must be on main)"
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Validate version input format
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::version must be semver like 3.3.3 or 3.3.3-rc1 (no leading 'v')."
            exit 1
          fi

      - name: Restrict to main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::This workflow must be run from main (ref was '${{ github.ref }}')."
          exit 1

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha }}

      - name: Validate commit is on main
        env:
          RELEASE_SHA: ${{ inputs.sha }}
        run: |
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error::Input SHA '$RELEASE_SHA' is not an ancestor of main."
            exit 1
          fi

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Validate version matches Cargo.toml
        run: |
          manifest_version=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
          if [ "$manifest_version" != "${{ inputs.version }}" ]; then
            echo "::error::Input version '${{ inputs.version }}' does not match Cargo.toml version '$manifest_version'."
            exit 1
          fi

      - name: Validate tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "::error::Tag v${{ inputs.version }} already exists."
            exit 1
          fi

      - name: Validate version not already published
        run: |
          if curl -sf "https://crates.io/api/v1/crates/cargo-readme/${{ inputs.version }}" > /dev/null; then
            echo "::error::cargo-readme ${{ inputs.version }} is already published on crates.io."
            exit 1
          fi

      - name: Run CI checks
        run: make ci

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Tag release
        run: |
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          case "${{ inputs.version }}" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            $prerelease_flag \
            --generate-notes
